<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIXA 제품 이미지 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container { max-height: 75vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50 px-4 py-3 shrink-0">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
            <a href="." class="text-xl font-bold tracking-tight flex items-center gap-2 hover:opacity-80 transition-opacity cursor-pointer">
                📦 <span>FIXA 데이터 이미지 뷰어</span>
            </a>
            <div class="text-xs text-slate-400">Final Release (CSV Export Added)</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-4 w-full flex-grow flex flex-col">
        
        <div id="loadingStatus" class="flex flex-col items-center justify-center p-16 bg-white rounded-xl shadow-sm border border-slate-200 mt-10">
            <svg class="animate-spin h-12 w-12 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h2 class="text-lg font-bold text-slate-800">서버 데이터 불러오는 중...</h2>
        </div>

        <div id="filterPanel" class="hidden bg-white p-5 rounded-xl shadow-sm border border-slate-200 shrink-0">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b pb-3 gap-2 mb-4">
                <h3 class="font-bold text-slate-800 text-base flex items-center gap-2">🔍 데이터 필터링</h3>
                <div class="text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-md font-bold border border-blue-100" id="counterDisplay"></div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Media Type</label>
                    <input type="text" id="searchMediaType" placeholder="예: vignette" class="w-full p-2.5 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Area</label>
                    <input type="text" id="searchArea" placeholder="예: bv002" class="w-full p-2.5 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">제품 번호</label>
                    <input type="text" id="searchArtNo" placeholder="예: 30238538" class="w-full p-2.5 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">EDS 필터 (재클릭 시 초기화)</label>
                    <div class="flex bg-slate-100 p-1.5 rounded-lg border border-slate-200 h-[42px]">
                        <label class="flex-1 text-center cursor-pointer h-full">
                            <input type="radio" name="edsFilter" value="ALL" class="peer hidden" checked>
                            <div class="h-full flex items-center justify-center text-xs font-bold text-slate-500 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm rounded-md transition-all">ALL</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer h-full">
                            <input type="radio" name="edsFilter" value="-" class="peer hidden">
                            <div class="h-full flex items-center justify-center text-xs font-bold text-slate-500 peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm rounded-md transition-all">-</div>
                        </label>
                        <label class="flex-1 text-center cursor-pointer h-full">
                            <input type="radio" name="edsFilter" value="PAST" class="peer hidden">
                            <div class="h-full flex items-center justify-center text-xs font-bold text-slate-500 peer-checked:bg-rose-500 peer-checked:text-white peer-checked:shadow-sm rounded-md transition-all">PAST</div>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div id="exportContainer" class="hidden md:flex justify-end px-1">
            <button id="exportCsvBtn" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                현재 목록 CSV 다운로드
            </button>
        </div>

        <div id="outputContainer" class="hidden flex-grow flex flex-col min-h-0">
            
            <div class="hidden md:flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex-grow">
                <div class="table-container">
                    <table class="w-full text-left border-collapse table-fixed min-w-[1000px]">
                        <thead class="bg-slate-900 text-white text-xs font-semibold uppercase sticky top-0 z-10">
                            <tr>
                                <th class="w-[10%] p-3 border-b border-slate-700">Media Type</th>
                                <th class="w-[10%] p-3 border-b border-slate-700">Area</th>
                                <th class="w-[12%] p-3 border-b border-slate-700">제품 번호</th>
                                <th class="w-[18%] p-3 border-b border-slate-700">제품명</th>
                                <th class="w-[30%] p-3 border-b border-slate-700 text-center">이미지</th>
                                <th class="w-[10%] p-3 border-b border-slate-700">SSD</th>
                                <th class="w-[10%] p-3 border-b border-slate-700">EDS</th>
                            </tr>
                        </thead>
                        <tbody id="desktopTableBody" class="text-sm divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>

            <div class="block md:hidden space-y-3 overflow-y-auto pb-6" id="mobileCardGrid"></div>

        </div>

    </main>

    <script>
        let serverData = [];
        let currentFilteredData = []; // CSV 다운로드를 위해 필터링된 전체 데이터를 담을 그릇
        
        const RENDER_LIMIT = 1000;
        const EDS_THRESHOLD = '20260701';

        function getTodayYYYYMMDD() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("JSON 낫파운드");
                
                serverData = await response.json();
                
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('filterPanel').classList.remove('hidden');
                
                // 모바일이 아닐 때만 다운로드 버튼 컨테이너 노출
                if (window.innerWidth >= 768) {
                    document.getElementById('exportContainer').classList.remove('hidden');
                    document.getElementById('exportContainer').classList.add('flex');
                }
                document.getElementById('outputContainer').classList.remove('hidden');
                
                applyFilterAndRender();
            } catch (err) {
                console.error(err);
                document.getElementById('loadingStatus').innerHTML = `
                    <div class="text-center">
                        <div class="bg-amber-100 text-amber-600 p-3 rounded-full inline-block mb-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800 mb-1">데이터가 생성 중이거나 없습니다.</h2>
                        <p class="text-sm text-slate-500">잠시 후 새로고침 해보세요.</p>
                    </div>`;
            }
        });

        // 타이핑 디바운스
        let filterTimeout;
        function debouncedFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(applyFilterAndRender, 250);
        }

        ['searchMediaType', 'searchArea', 'searchArtNo'].forEach(id => {
            document.getElementById(id).addEventListener('input', debouncedFilter);
        });

        let currentEdsValue = 'ALL';
        document.querySelectorAll('input[name="edsFilter"]').forEach(radio => {
            radio.addEventListener('click', (e) => {
                if (currentEdsValue === e.target.value && e.target.value !== 'ALL') {
                    document.querySelector('input[name="edsFilter"][value="ALL"]').checked = true;
                    currentEdsValue = 'ALL';
                    applyFilterAndRender();
                } else {
                    currentEdsValue = e.target.value;
                }
            });
            radio.addEventListener('change', applyFilterAndRender);
        });

        // 엑셀(CSV) 내보내기 로직
        document.getElementById('exportCsvBtn').addEventListener('click', () => {
            if (currentFilteredData.length === 0) {
                alert('다운로드할 데이터가 없습니다.');
                return;
            }

            const headers = ['Media Type', 'Area', '제품 번호', '제품명', 'SSD', 'EDS'];
            
            const csvRows = currentFilteredData.map(item => {
                const itemNameEscaped = (item.itemName || '-').replace(/"/g, '""'); // 따옴표 이스케이프
                return [
                    `"${item.mediaType || '-'}"`,
                    `"${item.area || '-'}"`,
                    `="${item.itemNumber}"`, // 엑셀에서 앞자리 0이 사라지지 않도록 수식 처리
                    `"${itemNameEscaped}"`,
                    `"${item.ssd || '-'}"`,
                    `"${item.eds || '-'}"`
                ].join(',');
            });

            const csvContent = headers.join(',') + '\n' + csvRows.join('\n');
            
            // 한글 깨짐 방지를 위한 BOM(\uFEFF) 추가
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            link.href = url;
            link.setAttribute('download', `FIXA_Filtered_Data_${getTodayYYYYMMDD()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function applyFilterAndRender() {
            const mFilter = document.getElementById('searchMediaType').value.toLowerCase().trim();
            const aFilter = document.getElementById('searchArea').value.toLowerCase().trim();
            const noFilter = document.getElementById('searchArtNo').value.trim();
            const edsToggleVal = document.querySelector('input[name="edsFilter"]:checked').value;

            // 전역 변수에 전체 필터링 결과 저장 (다운로드 용)
            currentFilteredData = serverData.filter(item => {
                const matchMedia = item.mediaType.toLowerCase().includes(mFilter);
                const matchArea = item.area.toLowerCase().includes(aFilter);
                const matchNo = item.itemNumber.includes(noFilter);
                
                let matchEds = true;
                if (edsToggleVal === '-') {
                    matchEds = !item.eds || item.eds.trim() === '';
                } else if (edsToggleVal === 'PAST') {
                    matchEds = item.eds && item.eds.length === 8 && !isNaN(item.eds) && item.eds <= EDS_THRESHOLD;
                }

                return matchMedia && matchArea && matchNo && matchEds;
            });

            // 렌더링은 무조건 1000개로 자름 (브라우저 보호)
            const limitedResults = currentFilteredData.slice(0, RENDER_LIMIT);
            
            let counterText = `전체 ${serverData.length.toLocaleString()}행 중 ${currentFilteredData.length.toLocaleString()}개 검색됨`;
            if (currentFilteredData.length > RENDER_LIMIT) {
                counterText += ` <span class="text-rose-600 font-black">(화면 표시 제한: ${RENDER_LIMIT}개)</span>`;
            }
            document.getElementById('counterDisplay').innerHTML = counterText;

            let desktopHtml = '';
            let mobileHtml = '';

            limitedResults.forEach(item => {
                let imgCellContent = '';
                if (item.imageUrl && item.imageUrl.startsWith('http')) {
                    imgCellContent = `<img src="${item.imageUrl}" loading="lazy" class="h-28 w-auto max-w-[200px] object-contain rounded bg-white cursor-zoom-in hover:scale-110 transition-transform shadow-sm border border-slate-200 mx-auto" onclick="window.open('${item.imageUrl}', '_blank')">`;
                } else {
                    imgCellContent = `<div class="flex justify-center items-center h-28 w-full"><span class="px-3 py-1 text-xs font-bold rounded-md bg-slate-100 text-slate-500 border border-slate-200">No Image</span></div>`;
                }

                let edsDisplay = item.eds || '-';
                if (item.eds && item.eds.length === 8 && !isNaN(item.eds)) {
                    if (item.eds <= EDS_THRESHOLD) {
                        edsDisplay = `<span class="bg-rose-500 text-white font-bold px-2.5 py-0.5 rounded-full text-[11px] shadow-sm tracking-wide">${item.eds}</span>`;
                    }
                }

                desktopHtml += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 font-medium text-slate-700 truncate">${item.mediaType || '-'}</td>
                        <td class="p-3 text-slate-600 font-semibold">${item.area || '-'}</td>
                        <td class="p-3 font-mono font-bold text-slate-900">${item.itemNumber}</td>
                        <td class="p-3 text-slate-700 text-xs font-medium leading-relaxed">${item.itemName || '-'}</td>
                        <td class="p-3 text-center align-middle py-2">${imgCellContent}</td>
                        <td class="p-3 text-slate-600">${item.ssd || '-'}</td>
                        <td class="p-3 align-middle">${edsDisplay}</td>
                    </tr>`;

                mobileHtml += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex items-start gap-4">
                            <div class="w-2/5 flex-shrink-0 flex justify-center items-center bg-slate-50 rounded-lg border border-slate-100 p-1 min-h-[100px] mt-1">
                                ${item.imageUrl.startsWith('http') 
                                    ? `<img src="${item.imageUrl}" loading="lazy" class="h-28 w-full object-contain cursor-zoom-in rounded" onclick="window.open('${item.imageUrl}', '_blank')">`
                                    : `<span class="text-[10px] text-slate-400 font-bold">NO IMAGE</span>`
                                }
                            </div>
                            <div class="w-3/5 space-y-2.5">
                                <div class="flex flex-col gap-1">
                                    <span class="text-[10px] bg-slate-100 w-fit px-1.5 py-0.5 rounded text-slate-500 font-bold uppercase truncate max-w-full">${item.mediaType || '-'}</span>
                                    <h4 class="text-lg font-black text-slate-900 leading-none mt-0.5">${item.itemNumber}</h4>
                                    <p class="text-[11px] text-slate-600 font-medium leading-tight line-clamp-2">${item.itemName || '-'}</p>
                                </div>
                                <div class="text-xs bg-blue-50/50 p-2 rounded border border-blue-100/50 space-y-1.5">
                                    <div class="flex justify-between items-center"><span class="text-slate-400 font-medium">Area:</span><span class="font-bold text-slate-700 truncate ml-2">${item.area || '-'}</span></div>
                                    <div class="flex justify-between items-center"><span class="text-slate-400 font-medium">SSD:</span><span class="font-bold text-slate-700">${item.ssd || '-'}</span></div>
                                    <div class="flex justify-between items-center"><span class="text-slate-400 font-medium">EDS:</span><span class="font-bold text-slate-700">${edsDisplay}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            if (limitedResults.length === 0) {
                document.getElementById('desktopTableBody').innerHTML = `<tr><td colspan="7" class="p-16 text-center text-slate-400 bg-slate-50/50">데이터가 없습니다.</td></tr>`;
                document.getElementById('mobileCardGrid').innerHTML = `<div class="p-16 text-center text-slate-400 bg-white rounded-xl border border-slate-200 shadow-sm">데이터가 없습니다.</div>`;
            } else {
                document.getElementById('desktopTableBody').innerHTML = desktopHtml;
                document.getElementById('mobileCardGrid').innerHTML = mobileHtml;
            }
        }
    </script>
</body>
</html>
